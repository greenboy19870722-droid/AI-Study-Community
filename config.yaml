server:
  address: ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

logger:
  level: "all"
  stdout: true

database:
  # 数据库类型：mysql
  type: "mysql"
  # Full DSN connection string
  link: "root:E65fjcrM7sZnzWXr@tcp(127.0.0.1:3306)/ai_study_community?charset=utf8mb4&loc=Local"
  # 字符集
  charset: "utf8mb4"
  # 最大连接数
  maxOpenConns: 100
  # 最大空闲连接数
  maxIdleConns: 10
  # 连接最大生命周期（秒）
  maxLifetime: 3600
  # 慢查询阈值（毫秒）
  slowThreshold: 500
  # 是否显示SQL语句
  showSql: true
  # 是否显示执行时间
  showExecTime: true
